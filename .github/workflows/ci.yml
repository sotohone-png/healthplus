name: HealthPlus CI

# main 브랜치에 push되거나, main으로의 PR이 생성될 때 자동 실행됩니다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # 백엔드가 연결할 MariaDB를 컨테이너로 띄웁니다.
    # application.properties의 설정(localhost:3306/healthdb, healthuser/healthuser)과
    # 값을 맞춰서, 백엔드 코드는 하나도 안 건드리고 그대로 CI에서 돌아가게 합니다.
    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: healthdb
          MYSQL_USER: healthuser
          MYSQL_PASSWORD: healthuser
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      # 1. 저장소 코드 내려받기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 백엔드 실행 환경 (Java 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # 3. 프론트엔드 실행 환경 (Node)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 4. 백엔드 빌드
      - name: Build backend
        working-directory: ./back
        run: chmod +x gradlew && ./gradlew build -x test

      # 5. 백엔드 백그라운드 실행
      #    ANTHROPIC_API_KEY가 없어도 서버는 정상적으로 뜹니다.
      #    (AI 관련 API만 응답이 비어있고, 나머지 기능은 정상 동작 - AIService의
      #     예외 처리 덕분입니다.)
      - name: Run backend in background
        working-directory: ./back
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          nohup ./gradlew bootRun > backend.log 2>&1 &
          echo "백엔드 기동 대기 중..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/products/list > /dev/null; then
              echo "백엔드 준비 완료"
              exit 0
            fi
            sleep 3
          done
          echo "백엔드가 제 시간에 뜨지 않았습니다. 로그:"
          cat backend.log
          exit 1

      # 6. 테스트용 계정/상품 데이터 주입
      #    login.spec.js, cart.spec.js 등이 의존하는 test2@test.com(USER),
      #    test@test.com(MANAGER), pno=1 상품을 매번 동일하게 만들어줍니다.
      #    GitHub Actions 기본 러너에는 mariadb 클라이언트가 없어서 먼저 설치합니다.
      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Seed test data
        run: |
          mariadb -h127.0.0.1 -uhealthuser -phealthuser healthdb < ci/seed.sql

      # 7. 프론트엔드 설치 및 백그라운드 실행
      - name: Install & run frontend
        working-directory: ./front
        run: |
          npm ci
          nohup npm run dev -- --host > frontend.log 2>&1 &
          echo "프론트엔드 기동 대기 중..."
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "프론트엔드 준비 완료"
              exit 0
            fi
            sleep 3
          done
          echo "프론트엔드가 제 시간에 뜨지 않았습니다. 로그:"
          cat frontend.log
          exit 1

      # 8. Postman(Newman) API 테스트 실행
      - name: Run Postman collection (Newman)
        run: |
          npm install -g newman
          newman run ci/HealthPlus_API.postman_collection.json --reporters cli,junit --reporter-junit-export newman-report.xml

      # 9. Playwright E2E 테스트 실행
      - name: Install Playwright deps
        working-directory: ./e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./e2e
        run: npx playwright test

      # 10. 실패 시에도 결과물(리포트, 로그)을 항상 남겨서 원인 확인 가능하게 함
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            newman-report.xml
            e2e/playwright-report/
            back/backend.log
            front/frontend.log
