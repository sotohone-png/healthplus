name: HealthPlus CI

# main лёҢлһңм№ҳм—җ pushлҗҳкұ°лӮҳ, mainмңјлЎңмқҳ PRмқҙ мғқм„ұлҗ  л•Ң мһҗлҸҷ мӢӨн–үлҗ©лӢҲлӢӨ.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # л°ұм—”л“ңк°Җ м—°кІ°н•  MariaDBлҘј м»Ён…Ңмқҙл„ҲлЎң лқ„мӣҒлӢҲлӢӨ.
    # application.propertiesмқҳ м„Өм •(localhost:3306/healthdb, healthuser/healthuser)кіј
    # к°’мқ„ л§һм¶°м„ң, л°ұм—”л“ң мҪ”л“ңлҠ” н•ҳлӮҳлҸ„ м•Ҳ кұҙл“ңлҰ¬кі  к·ёлҢҖлЎң CIм—җм„ң лҸҢм•„к°ҖкІҢ н•©лӢҲлӢӨ.
    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: healthdb
          MYSQL_USER: healthuser
          MYSQL_PASSWORD: healthuser
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      # 1. м ҖмһҘмҶҢ мҪ”л“ң лӮҙл Өл°ӣкё°
      - name: Checkout
        uses: actions/checkout@v4

      # 2. л°ұм—”л“ң мӢӨн–ү нҷҳкІҪ (Java 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # 3. н”„лЎ нҠём—”л“ң мӢӨн–ү нҷҳкІҪ (Node)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 4. л°ұм—”л“ң л№Ңл“ң
      - name: Build backend
        working-directory: ./back
        run: chmod +x gradlew && ./gradlew build -x test

      # 5. л°ұм—”л“ң л°ұк·ёлқјмҡҙл“ң мӢӨн–ү
      #    ANTHROPIC_API_KEYк°Җ м—Ҷм–ҙлҸ„ м„ңлІ„лҠ” м •мғҒм ҒмңјлЎң лң№лӢҲлӢӨ.
      #    (AI кҙҖл Ё APIл§Ң мқ‘лӢөмқҙ л№„м–ҙмһҲкі , лӮҳлЁём§Җ кё°лҠҘмқҖ м •мғҒ лҸҷмһ‘ - AIServiceмқҳ
      #     мҳҲмҷё мІҳлҰ¬ лҚ•л¶„мһ…лӢҲлӢӨ.)
      - name: Run backend in background
        working-directory: ./back
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          nohup ./gradlew bootRun > backend.log 2>&1 &
          echo "л°ұм—”л“ң кё°лҸҷ лҢҖкё° мӨ‘..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/products/list > /dev/null; then
              echo "л°ұм—”л“ң мӨҖл№„ мҷ„лЈҢ"
              exit 0
            fi
            sleep 3
          done
          echo "л°ұм—”л“ңк°Җ м ң мӢңк°„м—җ лңЁм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. лЎңк·ё:"
          cat backend.log
          exit 1

      # 6. н…ҢмҠӨнҠёмҡ© кі„м •/мғҒн’Ҳ лҚ°мқҙн„° мЈјмһ…
      #    login.spec.js, cart.spec.js л“ұмқҙ мқҳмЎҙн•ҳлҠ” test2@test.com(USER),
      #    test@test.com(MANAGER), pno=1 мғҒн’Ҳмқ„ л§ӨлІҲ лҸҷмқјн•ҳкІҢ л§Ңл“Өм–ҙмӨҚлӢҲлӢӨ.
      - name: Seed test data
        run: |
          mariadb -h127.0.0.1 -uhealthuser -phealthuser healthdb < ci/seed.sql

      # 7. н”„лЎ нҠём—”л“ң м„Өм№ҳ л°Ҹ л°ұк·ёлқјмҡҙл“ң мӢӨн–ү
      - name: Install & run frontend
        working-directory: ./front
        run: |
          npm ci
          nohup npm run dev -- --host > frontend.log 2>&1 &
          echo "н”„лЎ нҠём—”л“ң кё°лҸҷ лҢҖкё° мӨ‘..."
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "н”„лЎ нҠём—”л“ң мӨҖл№„ мҷ„лЈҢ"
              exit 0
            fi
            sleep 3
          done
          echo "н”„лЎ нҠём—”л“ңк°Җ м ң мӢңк°„м—җ лңЁм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. лЎңк·ё:"
          cat frontend.log
          exit 1

      # 8. Postman(Newman) API н…ҢмҠӨнҠё мӢӨн–ү
      - name: Run Postman collection (Newman)
        run: |
          npm install -g newman
          newman run ci/HealthPlus_API.postman_collection.json --reporters cli,junit --reporter-junit-export newman-report.xml

      # 9. Playwright E2E н…ҢмҠӨнҠё мӢӨн–ү
      - name: Install Playwright deps
        working-directory: ./e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./e2e
        run: npx playwright test

      # 10. мӢӨнҢЁ мӢңм—җлҸ„ кІ°кіјл¬ј(лҰ¬нҸ¬нҠё, лЎңк·ё)мқ„ н•ӯмғҒ лӮЁкІЁм„ң мӣҗмқё нҷ•мқё к°ҖлҠҘн•ҳкІҢ н•Ё
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            newman-report.xml
            e2e/playwright-report/
            back/backend.log
            front/frontend.log
